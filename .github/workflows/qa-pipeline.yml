name: Web3 QA Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Smart Contract Tests ───────────────────────────────────────────
  contract-tests:
    name: Smart Contract Tests (Hardhat)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: hardhat-contract-tests/package-lock.json

      - name: Install dependencies
        working-directory: hardhat-contract-tests
        run: npm ci

      - name: Compile contracts
        working-directory: hardhat-contract-tests
        run: npx hardhat compile

      - name: Run contract tests
        working-directory: hardhat-contract-tests
        run: npx hardhat test --reporter json > test-results.json

      - name: Run test coverage
        working-directory: hardhat-contract-tests
        run: npx hardhat coverage

      - name: Check coverage threshold
        working-directory: hardhat-contract-tests
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Line coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 90% threshold"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage
          path: hardhat-contract-tests/coverage/

  # ─── Job 2: API Tests ─────────────────────────────────────────────────────
  api-tests:
    name: API Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start local Hardhat node
        working-directory: hardhat-contract-tests
        run: |
          npm ci
          npx hardhat node &
          sleep 5  # Wait for node to start

      - name: Deploy test contracts
        working-directory: hardhat-contract-tests
        run: npx hardhat run scripts/deploy.js --network localhost

      - name: Install API test dependencies
        working-directory: api-tests
        run: npm ci

      - name: Run API tests
        working-directory: api-tests
        env:
          API_BASE_URL: http://localhost:4000
        run: npm test -- --forceExit

  # ─── Job 3: UI Tests ──────────────────────────────────────────────────────
  ui-tests:
    name: UI E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright dependencies
        working-directory: playwright-web3-ui
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: playwright-web3-ui
        run: npx playwright test

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-web3-ui/playwright-report/
          retention-days: 7

  # ─── Job 4: Security Scan ─────────────────────────────────────────────────
  security-scan:
    name: Contract Security Analysis (Slither)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        working-directory: hardhat-contract-tests
        run: |
          slither contracts/ \
            --exclude-dependencies \
            --json slither-report.json \
            || true  # Don't fail CI — review report manually

      - name: Upload Slither report
        uses: actions/upload-artifact@v4
        with:
          name: slither-security-report
          path: hardhat-contract-tests/slither-report.json
